name: Build and Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Use the version your project needs

    - name: 🛠️ Install & Build
      run: |
        npm install
        npm run build  # This creates the 'dist' or 'build' folder

    - name: 📂 Sync files to cPanel
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        # IMPORTANT: Use 'dist/' if you use Vite, or 'build/' if you use React
        local-dir: ./dist/ 
        server-dir: public_html/youngtechies.africa/
